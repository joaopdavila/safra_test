name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Ruff (lint)
        run: uv run ruff check .

      - name: Ruff (format)
        run: uv run ruff format --check .

      - name: Mypy (strict)
        run: uv run mypy src/

      - name: Pytest with coverage
        run: uv run pytest --cov=safra_quant --cov-report=term-missing

      - name: Execute notebook (demo mode, offline)
        env:
          SAFRA_QUANT_DEMO: "1"
        run: |
          uv run jupyter nbconvert --execute --to notebook \
            --ExecutePreprocessor.timeout=600 \
            --output /tmp/executed_notebook.ipynb \
            notebooks/01_prova_safra.ipynb
